tutorial: false

run:
  prefix: "myopic"
  name: "myopic-martavp-2025-2050-5-steps-all-sectors"
  disable_progressbar: false
  shared_resources:
    policy: false
  shared_cutouts: true

foresight: myopic

scenario:
  ll:
  - v1.5
  clusters:
  - 33
  sector_opts:
  - '144h'
  planning_horizons:
  - 2030
  - 2040
  - 2050

countries: ['AL', 'AT', 'BA', 'BE', 'BG', 'CH', 'CZ', 'DE', 'DK', 'EE', 'ES', 'FI', 'FR', 'GB', 'GR', 'HR', 'HU', 'IE', 'IT', 'LT', 'LU', 'LV', 'ME', 'MK', 'NL', 'NO', 'PL', 'PT', 'RO', 'RS', 'SE', 'SI', 'SK', 'XK']


snapshots:
  start: "2013-03-01"
  end: "2013-03-08"

sector:
  central_heat_vent: true

electricity:

  extendable_carriers:
    Generator: [OCGT]
    StorageUnit: [battery]
    Store: [H2]
    Link: [H2 pipeline]

  renewable_carriers: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float]

  estimate_renewable_capacities:
    enable: false

atlite:
  default_cutout: europe-2013-sarah3-era5
  cutouts:
    be-03-2013-era5:
      module: era5
      x: [4., 15.]
      y: [46., 56.]
      time: ["2013-03-01", "2013-03-08"]

renewable:
  onwind:
    cutout: europe-2013-sarah3-era5
  offwind-ac:
    cutout: europe-2013-sarah3-era5
    max_depth: false
  offwind-dc:
    cutout: europe-2013-sarah3-era5
    max_depth: false
  offwind-float:
    cutout: europe-2013-sarah3-era5
    max_depth: false
    min_depth: false
  solar:
    cutout: europe-2013-sarah3-era5
  solar-hsat:
    cutout: europe-2013-sarah3-era5

clustering:
  temporal:
    resolution_sector: 24h

industry:
  St_primary_fraction:
    2030: 0.6
    2040: 0.5
    2050: 0.4

solving:
  solver:
    name: highs
    options: highs-default
  mem: 4000

plotting:
  map:
    boundaries:
  eu_node_location:
    x: -5.5
    y: 46.
  costs_max: 1000
  costs_threshold: 0.0000001
  energy_max:
  energy_min:
  energy_threshold: 0.000001
